name: Publish

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release bump
                required: true
                default: patch
                type: choice
                options:
                    - patch
                    - minor
                    - major
    # push:
    #     branches:
    #         - main
    #     paths:
    #         - .github/workflows/publish.yml
    #         - .goreleaser.yml
    #         - cli/**
    #         - npm/**
    #         - proto/**
    #         - scripts/deploy/**

permissions:
    contents: write
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    swift-helpers:
        if: github.actor != 'github-actions[bot]'
        name: Build Swift helpers
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - id: cache
              uses: actions/cache@v5
              with:
                  path: build/forged-auth-release
                  key: swift-helpers-${{ hashFiles('cli/cmd/forged-auth/main.swift', 'cli/cmd/forged-auth/Info.plist') }}

            - if: steps.cache.outputs.cache-hit != 'true'
              run: ./scripts/deploy/build-auth-swift.sh

            - uses: actions/upload-artifact@v7
              with:
                  name: swift-helpers
                  path: build/forged-auth-release
                  retention-days: 1
                  if-no-files-found: error

    release:
        needs: swift-helpers
        if: github.actor != 'github-actions[bot]'
        name: Publish new ${{ github.event.inputs.version }} version
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-go@v6
              with:
                  go-version-file: cli/go.mod
                  check-latest: true
                  cache-dependency-path: cli/go.sum

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - uses: actions/download-artifact@v8
              with:
                  name: swift-helpers
                  path: build/forged-auth-release

            - run: find build/forged-auth-release -type f -name 'forged-auth' -exec chmod +x {} +

            - name: Setup Git & SSH signing
              run: |
                  git config user.email "ritik.jarvis@gmail.com"
                  git config user.name "Jarvis"
                  mkdir -p ~/.ssh/
                  echo "${{ secrets.JARVIS_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  git config gpg.format ssh
                  git config user.signingkey ~/.ssh/id_rsa
                  git config commit.gpgsign true
                  git config tag.gpgsign true

            - id: version
              env:
                  RELEASE_TYPE: ${{ github.event.inputs.version }}
              run: |
                  TAG="$(npm version "$RELEASE_TYPE" --prefix npm/cli --no-git-tag-version)"
                  node - <<'NODE' "npm/cli/package.json"
                  const fs = require("node:fs");
                  const [path] = process.argv.slice(2);
                  const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
                  for (const dependency of Object.keys(pkg.optionalDependencies || {})) {
                    pkg.optionalDependencies[dependency] = pkg.version;
                  }
                  fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
                  NODE
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

            - run: |
                  git add npm/cli/package.json
                  git commit -m "publish ${{ steps.version.outputs.tag }}"
                  git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"

            - uses: goreleaser/goreleaser-action@v7
              with:
                  distribution: goreleaser
                  version: '~> v2'
                  args: release --clean --skip=announce,publish,homebrew,nfpm,scoop

            - run: ./scripts/deploy/build-npm-packages.sh "${{ steps.version.outputs.version }}"

            - run: ./scripts/deploy/publish-npm-packages.sh "${{ steps.version.outputs.version }}"

            - run: git push --follow-tags origin HEAD:main
