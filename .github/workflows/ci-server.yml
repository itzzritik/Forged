name: CI - Server

on:
  push:
    paths: ['server/**', 'proto/**']
  pull_request:
    paths: ['server/**', 'proto/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: cd server && go build ./...
      - run: cd server && go vet ./...
