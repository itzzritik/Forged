name: CI - CLI

on:
  push:
    paths: ['cli/**', 'proto/**']
  pull_request:
    paths: ['cli/**', 'proto/**']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-13, ubuntu-latest, windows-latest]
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: cd cli && go build ./...
      - run: cd cli && go vet ./...

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: cd cli && GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build ./...
