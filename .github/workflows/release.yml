name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build npm packages from dist
        env:
          VERSION: ${{ github.ref_name }}
        run: ./scripts/build-npm-packages.sh "$VERSION"
      - name: Publish npm platform packages
        run: |
          npm publish --access public dist/npm/@getforged/cli-darwin-x64
          npm publish --access public dist/npm/@getforged/cli-darwin-arm64
          npm publish --access public dist/npm/@getforged/cli-linux-x64
          npm publish --access public dist/npm/@getforged/cli-linux-arm64
          npm publish --access public dist/npm/@getforged/cli-win32-x64
          npm publish --access public dist/npm/@getforged/cli-win32-arm64
      - name: Publish npm wrapper package
        run: npm publish --access public dist/npm/cli

  msi:
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Windows binaries
        run: |
          cd cli
          go build -o ../scripts/msi/forged.exe ./cmd/forged
          go build -o ../scripts/msi/forged-sign.exe ./cmd/forged-sign
          go build -o ../scripts/msi/forged-auth.exe ./cmd/forged-auth

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          cd scripts/msi
          wix build forged.wxs -o forged.msi

      - name: Upload MSI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release upload $tag scripts/msi/forged.msi --clobber
