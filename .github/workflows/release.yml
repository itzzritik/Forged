name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  msi:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Windows binaries
        run: |
          cd cli
          go build -o ../scripts/msi/forged.exe ./cmd/forged
          go build -o ../scripts/msi/forged-sign.exe ./cmd/forged-sign
          go build -o ../scripts/msi/forged-auth.exe ./cmd/forged-auth

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          cd scripts/msi
          wix build forged.wxs -o forged.msi

      - name: Upload MSI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release upload $tag scripts/msi/forged.msi --clobber
