version: 2

project_name: forged

before:
  hooks:
    - ./scripts/build-forged-auth-release.sh

builds:
  - id: forged
    main: ./cli/cmd/forged
    binary: forged
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/itzzritik/forged/cli/cmd/forged/cmd.version={{.Version}}
      - -X github.com/itzzritik/forged/cli/cmd/forged/cmd.commit={{.Commit}}

  - id: forged-sign
    main: ./cli/cmd/forged-sign
    binary: forged-sign
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    files:
      - src: dist/helpers/{{ .Os }}_{{ .Arch }}/forged-auth{{ if eq .Os "windows" }}.exe{{ end }}
        strip_parent: true
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: itzzritik
      name: homebrew-tap
    homepage: https://forged.ritik.me
    description: "SSH key management — forge your keys, take them anywhere"
    install: |
      bin.install "forged"
      bin.install "forged-sign"
      bin.install "forged-auth"

nfpms:
  - package_name: forged
    vendor: Forged
    homepage: https://forged.ritik.me
    maintainer: Ritik Srivastava
    description: "SSH key management"
    formats:
      - deb
      - rpm
    contents:
      - src: dist/helpers/linux_{{ .Arch }}/forged-auth
        dst: /usr/bin/forged-auth
        file_info:
          mode: 0755

scoops:
  - repository:
      owner: itzzritik
      name: scoop-bucket
    homepage: https://forged.ritik.me
    description: "SSH key management"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
